<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>404 — Page Not Found | FindMyGSoC</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      font-family: Arial, sans-serif;
      color: #111827;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 500px;
    }

    h1 {
      font-size: 72px;
      margin-bottom: 10px;
      color: #2563eb;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 16px;
    }

    p {
      font-size: 16px;
      color: #4b5563;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    #count {
      font-weight: bold;
      color: #2563eb;
    }

    a {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 22px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s ease;
    }

    a:hover {
      background: #1d4ed8;
    }

    noscript p {
      margin-top: 14px;
      color: #dc2626;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>404</h1>

    <h2>Page Not Found</h2>

    <p>
      The page you are looking for does not exist or may have been moved.
    </p>

    <p>
      Redirecting you back to the homepage in
      <span id="count">3</span>
      seconds...
    </p>

    <a href="/">
      Go Home Now →
    </a>

    <noscript>
      <p>
        JavaScript is disabled. Please use the button above to return home.
      </p>
    </noscript>
  </div>

  <script>
    let timeLeft = 3;

    const countElement = document.getElementById("count");

    const timer = setInterval(() => {
      timeLeft--;

      countElement.textContent = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(timer);
        globalThis.location.replace("/");
      }
    }, 1000);
  </script>
</body>
</html>
